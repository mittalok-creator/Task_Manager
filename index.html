<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Task Manager</title>
<meta name="theme-color" content="#232A33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Task Manager">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232A33; --ink-soft:#626A75; --ink-faint:#9AA1AB;
    --gold:#C9A86A; --gold-deep:#9C7C46; --gold-wash:#FBF6EC;
    --bg:#FAFBFC; --card:#FFFFFF; --panel:#F4F6F8; --line:#EBEEF1;
    --hi:#E5484D; --med:#E8930C; --low:#46A758;
    --personal:#3E63DD; --office:#8E4EC6;
    --r:16px; --r-sm:11px;
    --sh:0 1px 2px rgba(35,42,51,.04), 0 4px 16px rgba(35,42,51,.05);
    font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{max-width:600px;margin:0 auto;padding-bottom:120px;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}

  header{position:sticky;top:0;z-index:20;background:rgba(250,251,252,.86);
    backdrop-filter:saturate(1.4) blur(10px);padding:18px 18px 6px;border-bottom:1px solid var(--line)}
  .brandrow{display:flex;align-items:center;gap:13px}
  .mono{width:42px;height:42px;flex:none}
  .htext{flex:1;min-width:0}
  .htext h1{margin:0;font-weight:300;font-size:20px;letter-spacing:.08em}
  .htext .sub{font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:1px}
  .ring{width:46px;height:46px;flex:none}
  .ring text{font-family:'Poppins';font-weight:500;fill:var(--ink)}
  .gear{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--ink-soft)}
  .gear:active{background:var(--panel)}

  .viewswitch{display:flex;gap:6px;background:var(--panel);border-radius:12px;padding:4px;margin:12px 0 2px}
  .viewswitch button{flex:1;padding:9px;border-radius:9px;font-size:14px;font-weight:500;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:7px}
  .viewswitch button[data-on="1"]{background:var(--card);color:var(--ink);box-shadow:var(--sh)}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 18px 6px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
    color:var(--ink-soft);background:var(--card);border:1px solid var(--line);transition:transform .12s ease}
  .chip[data-on="1"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip:active{transform:scale(.95)}
  .chip .n{opacity:.6;margin-left:5px;font-weight:400}

  .searchwrap{padding:6px 18px 2px}
  .search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px}
  .search input{border:none;outline:none;flex:1;font-size:15px;background:none;color:var(--ink)}
  .search svg{color:var(--ink-faint);flex:none}

  .list{padding:10px 16px 0;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 14px;display:flex;gap:12px;box-shadow:var(--sh);transition:transform .12s ease, opacity .2s ease}
  .card:active{transform:scale(.992)}
  .card.done{opacity:.55}
  .card.overdue{border-color:#F3C9C9}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:none;margin-top:1px;display:grid;place-items:center;transition:all .15s ease}
  .check.on{background:var(--gold);border-color:var(--gold)}
  .check svg{opacity:0;transform:scale(.5);transition:all .15s ease;color:#fff}
  .check.on svg{opacity:1;transform:scale(1)}
  .body{flex:1;min-width:0}
  .title{font-size:15.5px;font-weight:500;line-height:1.35;word-break:break-word}
  .done .title{text-decoration:line-through;color:var(--ink-soft)}
  .meta{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:8px}
  .tag{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:999px;line-height:1.3}
  .tag.personal{color:var(--personal);background:#EDF1FF}
  .tag.office{color:var(--office);background:#F5EDFC}
  .due{font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;color:var(--ink-soft)}
  .due.today{color:var(--gold-deep)} .due.over{color:var(--hi)}
  .pri{width:8px;height:8px;border-radius:50%;flex:none}
  .pri.High{background:var(--hi)} .pri.Medium{background:var(--med)} .pri.Low{background:var(--low)}
  .when{font-size:12px;color:var(--ink-faint);font-weight:400}
  .att{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-soft);background:var(--panel);padding:3px 8px;border-radius:8px;max-width:170px}
  .att img{width:18px;height:18px;border-radius:4px;object-fit:cover}
  .att span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notes-prev{font-size:13px;color:var(--ink-soft);margin-top:7px;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
  .noteaccent{width:4px;border-radius:99px;background:var(--gold);flex:none}

  .empty{text-align:center;padding:60px 30px;color:var(--ink-faint)}
  .empty .em{width:54px;height:54px;margin:0 auto 16px;opacity:.5}
  .empty h3{margin:0 0 6px;font-weight:500;font-size:16px;color:var(--ink-soft)}
  .empty p{margin:0;font-size:13.5px;line-height:1.5}

  .fab{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:999px;padding:15px 26px;font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(35,42,51,.28);z-index:30}
  .fab:active{transform:translateX(-50%) scale(.96)}

  .scrim{position:fixed;inset:0;background:rgba(35,42,51,.42);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s ease}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:600px;margin:0 auto;background:var(--card);border-radius:22px 22px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(102%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto}
  .sheet.open{transform:translateY(0)}
  .grip{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 14px}
  .sheet h2{margin:0 0 16px;font-weight:500;font-size:18px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:7px;text-transform:uppercase}
  .field input[type=text],.field textarea,.field input[type=datetime-local]{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;font-size:16px;color:var(--ink);background:var(--card);outline:none}
  .field textarea{resize:vertical;line-height:1.5}
  .field input:focus,.field textarea:focus{border-color:var(--gold)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:11px;border-radius:var(--r-sm);border:1px solid var(--line);font-size:14px;font-weight:500;color:var(--ink-soft);background:var(--card)}
  .seg button[data-on="1"]{color:#fff}
  .seg.ctx button[data-on="1"][data-v="Personal"]{background:var(--personal);border-color:var(--personal)}
  .seg.ctx button[data-on="1"][data-v="Office"]{background:var(--office);border-color:var(--office)}
  .seg.pri button[data-on="1"][data-v="High"]{background:var(--hi);border-color:var(--hi)}
  .seg.pri button[data-on="1"][data-v="Medium"]{background:var(--med);border-color:var(--med)}
  .seg.pri button[data-on="1"][data-v="Low"]{background:var(--low);border-color:var(--low)}
  .filechip{display:flex;align-items:center;gap:10px;border:1px dashed var(--line);border-radius:var(--r-sm);padding:12px 14px;color:var(--ink-soft);font-size:14px}
  .filechip img{width:38px;height:38px;border-radius:8px;object-fit:cover}
  .filechip .x{margin-left:auto;color:var(--ink-faint);padding:4px}
  .actions{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:15px;border-radius:var(--r-sm);font-size:15px;font-weight:600}
  .btn.primary{background:var(--gold);color:#fff}
  .btn.primary:active{background:var(--gold-deep)}
  .btn.danger{color:var(--hi);background:#FDEDED;flex:0 0 auto;padding:15px 18px}

  .srow{display:flex;align-items:center;gap:13px;padding:15px 2px;border-bottom:1px solid var(--line);width:100%;text-align:left}
  .srow:last-of-type{border-bottom:none}
  .srow .ic{width:38px;height:38px;border-radius:11px;background:var(--gold-wash);display:grid;place-items:center;color:var(--gold-deep);flex:none}
  .srow .tx{flex:1}.srow .tx b{font-weight:500;font-size:15px;display:block}
  .srow .tx small{color:var(--ink-soft);font-size:12.5px}
  .srow .go{color:var(--ink-faint)}
  .sechead{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:18px 2px 2px}
  .note{font-size:12.5px;color:var(--ink-soft);line-height:1.55;background:var(--gold-wash);border-radius:12px;padding:12px 14px;margin-top:12px}
  .credit{text-align:center;font-size:12px;letter-spacing:.06em;color:var(--ink-faint);padding:30px 0 6px}
  .credit b{font-weight:500;color:var(--gold-deep)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;z-index:60;opacity:0;pointer-events:none;transition:all .25s ease;font-weight:500;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brandrow">
    <svg class="mono" viewBox="0 0 300 300" fill="none">
      <circle cx="150" cy="150" r="132" stroke="#C9A86A" stroke-width="7"/>
      <path d="M45 220 L100 80 L155 220 M72 166 L128 166" stroke="#C9A86A" stroke-width="15" stroke-linejoin="round"/>
      <path d="M155 220 V80 L205 150 L255 80 V220" stroke="#C9A86A" stroke-width="15" stroke-linejoin="round"/>
    </svg>
    <div class="htext"><h1>Task Manager</h1><div class="sub" id="dateline">—</div></div>
    <svg class="ring" viewBox="0 0 46 46" id="ring">
      <circle cx="23" cy="23" r="18" fill="none" stroke="#EBEEF1" stroke-width="4"/>
      <circle id="ringfill" cx="23" cy="23" r="18" fill="none" stroke="#C9A86A" stroke-width="4" stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="113" transform="rotate(-90 23 23)"/>
      <text x="23" y="27" text-anchor="middle" id="ringtxt" font-size="11">0</text>
    </svg>
    <button class="gear" id="openSettings" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="viewswitch" id="viewswitch">
    <button data-view="tasks" data-on="1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks</button>
    <button data-view="notes" data-on="0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>Notes</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="searchwrap"><div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" placeholder="Search tasks" autocomplete="off">
  </div></div>
</header>

<div class="list" id="list"></div>
<footer class="credit">Crafted by <b>Alok Mittal</b></footer>

<button class="fab" id="addBtn">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  <span id="fabLabel">Add task</span>
</button>

<div class="scrim" id="scrim"></div>

<!-- Task editor -->
<div class="sheet" id="editor">
  <div class="grip"></div>
  <h2 id="editorTitle">New task</h2>
  <div class="field"><label>Task</label><input type="text" id="f_title" placeholder="What needs doing?"></div>
  <div class="field"><label>Context</label><div class="seg ctx" id="f_ctx"><button data-v="Personal">Personal</button><button data-v="Office">Office</button></div></div>
  <div class="field"><label>Priority</label><div class="seg pri" id="f_pri"><button data-v="High">High</button><button data-v="Medium">Medium</button><button data-v="Low">Low</button></div></div>
  <div class="field"><label>Due date &amp; time</label><input type="datetime-local" id="f_due"></div>
  <div class="field"><label>Notes</label><textarea id="f_notes" rows="2" placeholder="Details, links…"></textarea></div>
  <div class="field"><label>Attachment</label>
    <input type="file" id="f_file" hidden>
    <div class="filechip" id="fileEmpty"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg> Add a file or photo</div>
    <div class="filechip" id="filePreview" style="display:none"></div>
  </div>
  <div class="actions"><button class="btn danger" id="deleteBtn" style="display:none">Delete</button><button class="btn primary" id="saveBtn">Save task</button></div>
</div>

<!-- Note editor -->
<div class="sheet" id="noteEditor">
  <div class="grip"></div>
  <h2 id="noteEditorTitle">New note</h2>
  <div class="field"><label>Title</label><input type="text" id="n_title" placeholder="Note title"></div>
  <div class="field"><label>Context</label><div class="seg ctx" id="n_ctx"><button data-v="Personal">Personal</button><button data-v="Office">Office</button></div></div>
  <div class="field"><label>Note</label><textarea id="n_body" rows="7" placeholder="Write anything — ideas, meeting notes, references…"></textarea></div>
  <div class="field"><label>Attachment</label>
    <input type="file" id="n_file" hidden>
    <div class="filechip" id="nfileEmpty"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg> Add a file or photo</div>
    <div class="filechip" id="nfilePreview" style="display:none"></div>
  </div>
  <div class="actions"><button class="btn danger" id="noteDeleteBtn" style="display:none">Delete</button><button class="btn primary" id="noteSaveBtn">Save note</button></div>
</div>

<!-- Settings -->
<div class="sheet" id="settings">
  <div class="grip"></div>
  <h2>Settings</h2>
  <button class="srow" id="notifRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
    <div class="tx"><b>Reminders</b><small id="notifState">Tap to enable notifications</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>

  <div class="sechead">Cloud sync (OneDrive / Google Drive)</div>
  <button class="srow" id="connectRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 16h2a4 4 0 0 0 0-8 5 5 0 0 0-9.6-1.3A4 4 0 1 0 6 16h2M12 12v9M8 17l4 4 4-4"/></svg></div>
    <div class="tx"><b id="connectLabel">Connect a sync file</b><small id="syncState">Auto-saves to a file in your cloud folder</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>
  <button class="srow" id="openSyncRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-7l-2-3H4a1 1 0 0 0-1 1z"/></svg></div>
    <div class="tx"><b>Open existing sync file</b><small>Use on another device — loads its data</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>
  <button class="srow" id="pullRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15"/></svg></div>
    <div class="tx"><b>Pull latest from sync file</b><small>Refresh this device with cloud changes</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>

  <div class="sechead">Manual backup</div>
  <button class="srow" id="exportRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
    <div class="tx"><b>Back up to a file</b><small>Save everything once</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>
  <button class="srow" id="importRow">
    <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 8l5-5 5 5M12 3v12"/></svg></div>
    <div class="tx"><b>Restore from a file</b><small>Replace with a saved backup</small></div>
    <div class="go"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
  </button>
  <input type="file" id="importFile" accept="application/json" hidden>
  <button class="srow" id="clearRow">
    <div class="ic" style="background:#FDEDED;color:var(--hi)"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></div>
    <div class="tx"><b style="color:var(--hi)">Clear everything</b><small>Tasks and notes — can't be undone</small></div>
  </button>
  <div class="note" id="installNote"></div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY="cc_data_v2", OLD="cc_tasks_v1";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let state={view:"tasks",tasks:[],notes:[],filter:"today",search:"",editing:null,editingNote:null,draftFile:undefined,draftNoteFile:undefined};

/* storage */
function persistObj(){return {app:"command-center",version:2,exported:new Date().toISOString(),tasks:state.tasks,notes:state.notes}}
function load(){
  try{const v2=JSON.parse(localStorage.getItem(KEY));if(v2){state.tasks=v2.tasks||[];state.notes=v2.notes||[];return}}catch(e){}
  try{const v1=JSON.parse(localStorage.getItem(OLD));if(Array.isArray(v1))state.tasks=v1}catch(e){}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(persistObj()))}catch(e){toast("Storage full — remove a big attachment or back up")}syncWrite()}

/* dates */
function fmtDateline(){return new Date().toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"})}
function relDue(iso){
  if(!iso)return null;
  const due=new Date(iso),now=new Date(),ms=due-now,day=86400000;
  const sameDay=due.toDateString()===now.toDateString();
  const time=due.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  if(ms<0){const od=Math.ceil(-ms/day);return{cls:"over",txt:od<=1?("Overdue · "+time):("Overdue "+od+"d")}}
  if(sameDay)return{cls:"today",txt:"Today · "+time};
  const tmr=new Date(now);tmr.setDate(now.getDate()+1);
  if(due.toDateString()===tmr.toDateString())return{cls:"",txt:"Tomorrow · "+time};
  if(ms<7*day)return{cls:"",txt:due.toLocaleDateString(undefined,{weekday:"short"})+" · "+time};
  return{cls:"",txt:due.toLocaleDateString(undefined,{day:"numeric",month:"short"})};
}
function isToday(iso){if(!iso)return false;const d=new Date(iso),n=new Date();return d.toDateString()===n.toDateString()||d<n}
function isOverdue(t){return t.due&&!t.done&&new Date(t.due)<new Date()}
function fmtNoteDate(ts){const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString())return "Today · "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:d.getFullYear()!==n.getFullYear()?"numeric":undefined})}

/* filters */
const FILTERS=[{k:"today",label:"Today"},{k:"upcoming",label:"Upcoming"},{k:"all",label:"All"},{k:"Personal",label:"Personal"},{k:"Office",label:"Office"},{k:"done",label:"Done"}];
function matchFilter(t){const f=state.filter;
  if(f==="done")return t.done; if(t.done)return false;
  if(f==="all")return true;
  if(f==="today")return isToday(t.due)||isOverdue(t);
  if(f==="upcoming")return t.due&&new Date(t.due)>new Date();
  if(f==="Personal")return t.context==="Personal";
  if(f==="Office")return t.context==="Office";
  return true}
function passSearch(o){const q=state.search.trim().toLowerCase();if(!q)return true;
  return ((o.title||"")+" "+(o.notes||"")+" "+(o.body||"")).toLowerCase().includes(q)}
function countFor(k){const s=state.filter;state.filter=k;const n=state.tasks.filter(t=>matchFilter(t)&&passSearch(t)).length;state.filter=s;return n}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

/* render */
function setView(v){state.view=v;$$("#viewswitch button").forEach(b=>b.dataset.on=b.dataset.view===v?"1":"0");
  $("#chips").style.display=v==="tasks"?"flex":"none";
  $("#search").placeholder=v==="tasks"?"Search tasks":"Search notes";
  $("#fabLabel").textContent=v==="tasks"?"Add task":"Add note";render()}
function renderChips(){$("#chips").innerHTML=FILTERS.map(f=>{const n=countFor(f.k);
  return `<button class="chip" data-k="${f.k}" data-on="${state.filter===f.k?1:0}">${f.label}${n?`<span class="n">${n}</span>`:""}</button>`}).join("");
  $$("#chips .chip").forEach(c=>c.onclick=()=>{state.filter=c.dataset.k;render()})}
function ringUpdate(){const arr=state.tasks.filter(t=>(t.due&&new Date(t.due).toDateString()===new Date().toDateString())||isOverdue(t));
  const done=arr.filter(t=>t.done).length,all=arr.length,pct=all?done/all:0;
  $("#ringfill").style.strokeDashoffset=String(113-113*pct);
  $("#ringtxt").textContent=all?`${done}/${all}`:"0";$("#ringtxt").setAttribute("font-size",all?"10":"11")}
function render(){
  $("#dateline").textContent=fmtDateline();ringUpdate();
  if(state.view==="tasks"){renderChips();renderTasks()}else{renderNotes()}
}
function renderTasks(){
  let items=state.tasks.filter(t=>matchFilter(t)&&passSearch(t));
  items.sort((a,b)=>{if(!!a.due!==!!b.due)return a.due?-1:1;if(a.due&&b.due)return new Date(a.due)-new Date(b.due);
    const pr={High:0,Medium:1,Low:2};return pr[a.priority]-pr[b.priority]});
  const list=$("#list");
  if(!items.length){list.innerHTML=emptyTasks();return}
  list.innerHTML=items.map(taskCard).join("");
  $$(".card").forEach(el=>{const id=el.dataset.id;
    el.querySelector(".check").onclick=e=>{e.stopPropagation();toggle(id)};
    el.querySelector(".body").onclick=()=>openEditor(id);
    const a=el.querySelector(".att");if(a&&a.dataset.url)a.onclick=e=>{e.stopPropagation();openAtt(a.dataset.url,a.dataset.name)}})}
function taskCard(t){const rel=relDue(t.due);
  const att=t.file?`<span class="att" data-url="${t.file.dataUrl}" data-name="${esc(t.file.name)}">${t.file.type&&t.file.type.startsWith("image")?`<img src="${t.file.dataUrl}">`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`}<span>${esc(t.file.name)}</span></span>`:"";
  return `<div class="card ${t.done?"done":""} ${isOverdue(t)?"overdue":""}" data-id="${t.id}">
    <button class="check ${t.done?"on":""}" aria-label="Toggle done"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
    <div class="body"><div class="title">${esc(t.title)}</div>
      <div class="meta"><span class="pri ${t.priority}"></span><span class="tag ${t.context==="Office"?"office":"personal"}">${t.context}</span>${rel?`<span class="due ${rel.cls}">${rel.txt}</span>`:""}${att}</div>
      ${t.notes?`<div class="notes-prev">${esc(t.notes)}</div>`:""}</div></div>`}
function renderNotes(){
  let items=state.notes.filter(passSearch).slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const list=$("#list");
  if(!items.length){list.innerHTML=emptyNotes();return}
  list.innerHTML=items.map(noteCard).join("");
  $$(".card").forEach(el=>{const id=el.dataset.id;
    el.querySelector(".body").onclick=()=>openNote(id);
    const a=el.querySelector(".att");if(a&&a.dataset.url)a.onclick=e=>{e.stopPropagation();openAtt(a.dataset.url,a.dataset.name)}})}
function noteCard(n){
  const att=n.file?`<span class="att" data-url="${n.file.dataUrl}" data-name="${esc(n.file.name)}">${n.file.type&&n.file.type.startsWith("image")?`<img src="${n.file.dataUrl}">`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`}<span>${esc(n.file.name)}</span></span>`:"";
  return `<div class="card" data-id="${n.id}">
    <div class="noteaccent"></div>
    <div class="body"><div class="title">${esc(n.title||"Untitled")}</div>
      <div class="meta"><span class="tag ${n.context==="Office"?"office":"personal"}">${n.context}</span><span class="when">${fmtNoteDate(n.updatedAt)}</span>${att}</div>
      ${n.body?`<div class="notes-prev">${esc(n.body)}</div>`:""}</div></div>`}
function emptyTasks(){const m={today:["You're clear for today","New tasks due today land here."],upcoming:["Nothing scheduled ahead","Give a task a due date to see it here."],all:["No tasks yet","Tap Add task to start."],Personal:["No personal tasks","Add one tagged Personal."],Office:["No office tasks","Add one tagged Office."],done:["Nothing completed yet","Finished tasks archive here."]}[state.filter]||["Nothing here","Add a task."];
  return `<div class="empty"><svg class="em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><h3>${m[0]}</h3><p>${m[1]}</p></div>`}
function emptyNotes(){return `<div class="empty"><svg class="em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg><h3>No notes yet</h3><p>Capture ideas, meeting notes and references here.</p></div>`}

/* task mutations */
function toggle(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;if(t.done)t.notified=true;save();render();toast(t.done?"Done":"Marked active")}
function openEditor(id){state.editing=id||null;state.draftFile=undefined;const t=id?state.tasks.find(x=>x.id===id):null;
  $("#editorTitle").textContent=id?"Edit task":"New task";
  $("#f_title").value=t?t.title:"";$("#f_notes").value=t?t.notes||"":"";
  $("#f_due").value=t&&t.due?toLocalInput(t.due):"";
  setSeg("#f_ctx",t?t.context:"Personal");setSeg("#f_pri",t?t.priority:"Medium");
  showFile(t?t.file:null);$("#deleteBtn").style.display=id?"block":"none";
  openSheet("#editor");if(!id)setTimeout(()=>$("#f_title").focus(),300)}
function toLocalInput(iso){const d=new Date(iso),p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`}
function setSeg(sel,val){$$(sel+" button").forEach(b=>b.dataset.on=b.dataset.v===val?"1":"0")}
function getSeg(sel){const b=$(sel+' button[data-on="1"]');return b?b.dataset.v:null}
$$(".seg").forEach(seg=>seg.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;[...seg.children].forEach(x=>x.dataset.on="0");b.dataset.on="1"}));
function showFile(file){state.draftFile=file===null?undefined:file;const has=file&&file.dataUrl;
  $("#fileEmpty").style.display=has?"none":"flex";const p=$("#filePreview");p.style.display=has?"flex":"none";
  if(has){p.innerHTML=`${file.type&&file.type.startsWith("image")?`<img src="${file.dataUrl}">`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(file.name)}</span><button class="x" id="rmFile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
    $("#rmFile").onclick=()=>{$("#f_file").value="";showFile(null)}}}
$("#fileEmpty").onclick=()=>$("#f_file").click();
$("#f_file").onchange=e=>{const file=e.target.files[0];if(!file)return;if(file.size>3.5*1024*1024){toast("File too large (max ~3.5 MB)");return}const r=new FileReader();r.onload=()=>showFile({name:file.name,type:file.type,dataUrl:r.result});r.readAsDataURL(file)};
$("#saveBtn").onclick=()=>{const title=$("#f_title").value.trim();if(!title){toast("Give the task a name");$("#f_title").focus();return}
  const dueRaw=$("#f_due").value;
  const data={title,notes:$("#f_notes").value.trim(),context:getSeg("#f_ctx")||"Personal",priority:getSeg("#f_pri")||"Medium",due:dueRaw?new Date(dueRaw).toISOString():null};
  if(state.editing){const t=state.tasks.find(x=>x.id===state.editing);Object.assign(t,data,{file:state.draftFile===undefined?t.file:state.draftFile,notified:false})}
  else{state.tasks.push({id:"t"+Date.now()+Math.random().toString(36).slice(2,6),done:false,notified:false,createdAt:Date.now(),...data,file:state.draftFile||null})}
  save();closeSheets();render();toast(state.editing?"Saved":"Task added")};
$("#deleteBtn").onclick=()=>{if(!state.editing)return;if(!confirm("Delete this task?"))return;state.tasks=state.tasks.filter(x=>x.id!==state.editing);save();closeSheets();render();toast("Deleted")};

/* note mutations */
function openNote(id){state.editingNote=id||null;state.draftNoteFile=undefined;const n=id?state.notes.find(x=>x.id===id):null;
  $("#noteEditorTitle").textContent=id?"Edit note":"New note";
  $("#n_title").value=n?n.title||"":"";$("#n_body").value=n?n.body||"":"";
  setSeg("#n_ctx",n?n.context:"Personal");showNoteFile(n?n.file:null);
  $("#noteDeleteBtn").style.display=id?"block":"none";
  openSheet("#noteEditor");if(!id)setTimeout(()=>$("#n_title").focus(),300)}
function showNoteFile(file){state.draftNoteFile=file===null?undefined:file;const has=file&&file.dataUrl;
  $("#nfileEmpty").style.display=has?"none":"flex";const p=$("#nfilePreview");p.style.display=has?"flex":"none";
  if(has){p.innerHTML=`${file.type&&file.type.startsWith("image")?`<img src="${file.dataUrl}">`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(file.name)}</span><button class="x" id="rmNoteFile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
    $("#rmNoteFile").onclick=()=>{$("#n_file").value="";showNoteFile(null)}}}
$("#nfileEmpty").onclick=()=>$("#n_file").click();
$("#n_file").onchange=e=>{const file=e.target.files[0];if(!file)return;if(file.size>3.5*1024*1024){toast("File too large (max ~3.5 MB)");return}const r=new FileReader();r.onload=()=>showNoteFile({name:file.name,type:file.type,dataUrl:r.result});r.readAsDataURL(file)};
$("#noteSaveBtn").onclick=()=>{const title=$("#n_title").value.trim(),body=$("#n_body").value.trim();
  if(!title&&!body){toast("Write a title or note");$("#n_title").focus();return}
  const data={title:title||"Untitled",body,context:getSeg("#n_ctx")||"Personal",updatedAt:Date.now()};
  if(state.editingNote){const n=state.notes.find(x=>x.id===state.editingNote);Object.assign(n,data,{file:state.draftNoteFile===undefined?n.file:state.draftNoteFile})}
  else{state.notes.push({id:"n"+Date.now()+Math.random().toString(36).slice(2,6),createdAt:Date.now(),...data,file:state.draftNoteFile||null})}
  save();closeSheets();render();toast(state.editingNote?"Note saved":"Note added")};
$("#noteDeleteBtn").onclick=()=>{if(!state.editingNote)return;if(!confirm("Delete this note?"))return;state.notes=state.notes.filter(x=>x.id!==state.editingNote);save();closeSheets();render();toast("Deleted")};

/* attachments */
function openAtt(url,name){if(url.startsWith("data:image")){const w=window.open();if(w)w.document.write(`<img src="${url}" style="max-width:100%">`)}else{const a=document.createElement("a");a.href=url;a.download=name||"attachment";a.click()}}

/* sheets */
function openSheet(sel){$("#scrim").classList.add("open");$(sel).classList.add("open")}
function closeSheets(){$("#scrim").classList.remove("open");["#editor","#noteEditor","#settings"].forEach(s=>$(s).classList.remove("open"))}
$("#scrim").onclick=closeSheets;
$("#addBtn").onclick=()=>state.view==="tasks"?openEditor(null):openNote(null);
$("#openSettings").onclick=()=>{refreshSettings();openSheet("#settings")};
$$("#viewswitch button").forEach(b=>b.onclick=()=>setView(b.dataset.view));
$("#search").oninput=e=>{state.search=e.target.value;render()};

/* ---------- cloud sync via File System Access ---------- */
let syncHandle=null,syncTimer=null;
function fsSupported(){return "showSaveFilePicker" in window}
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open("cc_sync",1);r.onupgradeneeded=()=>r.result.createObjectStore("kv");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbSet(k,v){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction("kv","readwrite");tx.objectStore("kv").put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}
async function idbGet(k){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction("kv","readonly");const rq=tx.objectStore("kv").get(k);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)})}
async function ensurePerm(h,write){const o={mode:write?"readwrite":"read"};if(await h.queryPermission(o)==="granted")return true;if(await h.requestPermission(o)==="granted")return true;return false}
async function connectSync(){if(!fsSupported()){toast("Auto-sync needs desktop Chrome or Edge");return}
  try{const h=await window.showSaveFilePicker({suggestedName:"command-center-data.json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
    syncHandle=h;await idbSet("handle",h);await syncWrite(true);toast("Sync connected — saved");refreshSettings()}
  catch(e){if(e.name!=="AbortError")toast("Couldn't connect. Try hosting the app (see note).")}}
async function openSync(){if(!fsSupported()){toast("Auto-sync needs desktop Chrome or Edge");return}
  try{const [h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
    syncHandle=h;await idbSet("handle",h);await pullFromSync(false);toast("Connected & loaded");refreshSettings()}
  catch(e){if(e.name!=="AbortError")toast("Couldn't open file")}}
async function syncWrite(now){if(!syncHandle)return;clearTimeout(syncTimer);
  const doWrite=async()=>{try{if(!(await ensurePerm(syncHandle,true)))return;const w=await syncHandle.createWritable();await w.write(JSON.stringify(persistObj(),null,2));await w.close();await idbSet("stamp",Date.now());refreshSyncLine()}catch(e){}};
  if(now)return doWrite();syncTimer=setTimeout(doWrite,800)}
async function pullFromSync(silent){if(!syncHandle){toast("No sync file connected");return}
  try{if(!(await ensurePerm(syncHandle,false)))return;const f=await syncHandle.getFile();const txt=await f.text();if(!txt.trim())return;
    const data=JSON.parse(txt);state.tasks=data.tasks||[];state.notes=data.notes||[];localStorage.setItem(KEY,JSON.stringify(persistObj()));render();if(!silent)toast("Loaded latest")}
  catch(e){toast("Couldn't read sync file")}}
async function refreshSyncLine(){let name=syncHandle?syncHandle.name:null;let stamp=null;try{stamp=await idbGet("stamp")}catch(e){}
  $("#connectLabel").textContent=syncHandle?"Sync file connected":"Connect a sync file";
  $("#syncState").textContent=syncHandle?(name+(stamp?(" · saved "+new Date(stamp).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})):"")):"Auto-saves to a file in your cloud folder"}
async function initSync(){try{const h=await idbGet("handle");if(h){syncHandle=h}}catch(e){}refreshSyncLine()}

/* settings */
function refreshSettings(){
  const perm=("Notification" in window)?Notification.permission:"unsupported";
  $("#notifState").textContent=perm==="granted"?"On — reminders fire at due time":perm==="denied"?"Blocked in browser settings":perm==="unsupported"?"Not supported here":"Tap to enable notifications";
  refreshSyncLine();
  const hosted=location.protocol==="https:"||location.protocol==="http:";
  const fs=fsSupported();
  let msg="";
  if(!fs)msg="Auto cloud-sync needs <b>desktop Chrome or Edge</b>. On phone, use <b>Back up</b> / <b>Restore</b>, or host the app (below) for installs.";
  else msg="<b>Realtime cloud backup:</b> tap <b>Connect a sync file</b> and save it inside your <b>OneDrive</b> or <b>Google Drive</b> folder. Every change auto-saves there, and your cloud app syncs it to the cloud + other devices. On another computer, use <b>Open existing sync file</b> → pick the same file.";
  if(!hosted)msg+="<br><br>You're running a local file. For phone install + offline, host it free: <b>app.netlify.com/drop</b> → drag this file → open the link → Add to Home Screen.";
  $("#installNote").innerHTML=msg;
}
$("#notifRow").onclick=async()=>{if(!("Notification" in window)){toast("Notifications not supported here");return}

$("#connectRow").onclick=connectSync;
$("#openSyncRow").onclick=openSync;
$("#pullRow").onclick=()=>pullFromSync(false);
$("#exportRow").onclick=()=>{const blob=new Blob([JSON.stringify(persistObj(),null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="command-center-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(a.href);toast("Backup saved")};
$("#importRow").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);const tk=Array.isArray(data)?data:data.tasks;const nt=data.notes||[];if(!Array.isArray(tk))throw 0;if(!confirm(`Restore ${tk.length} tasks and ${nt.length} notes? This replaces what's here.`))return;state.tasks=tk;state.notes=nt;save();closeSheets();render();toast("Restored")}catch(err){toast("That file couldn't be read")}};r.readAsText(file);e.target.value=""};
$("#clearRow").onclick=()=>{if(!confirm("Delete ALL tasks and notes? Back up first if unsure."))return;state.tasks=[];state.notes=[];save();closeSheets();render();toast("All cleared")};
